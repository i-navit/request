<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="https://i-navit.github.io/request/favicon.ico" type="image/x-icon">
    <title>ファッション占いガチャ｜ぼっちんガイド</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 20260221_2230 ファション占いゲーム -->
    <script src="./gacha_config.js?v=20240220"></script>

    <style>
        /* --- 画面全体の基本設定 --- */
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        /* --- アプリの外枠（コンテナ） --- */
        .app-container {
            position: relative;
            background: #000;
            overflow: hidden;
            width: 100vw;
            /* iPhone Safariのツールバー対策（動的ビューポート） */
            height: 100vh;
            height: 100dvh;
            margin: 0 auto;
        }

        /* PC（横長画面）の場合のみ、縦長9:16の枠を中央に表示 */
        @media (min-aspect-ratio: 1/1) {
            .app-container {
                width: auto;
                aspect-ratio: 9 / 16;
            }
        }

        /* --- 全画面コンテンツ（ビデオ・画像）の共通設定 --- */
        .full-screen-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
        }

        /* 各要素の重なり順（z-index） */
        #gacha-video {
            z-index: 20;
        }

        #result-screen {
            z-index: 40;
            background: #000;
            position: absolute;
            inset: 0;
        }

        #result-display {
            z-index: 50;
            position: relative;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            animation: zoomOutFade 1.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        #effect-video {
            z-index: 100;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            mix-blend-mode: screen;
            object-fit: cover;
            object-position: top center;
        }

        #loading {
            z-index: 200;
            position: absolute;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        #limit-message {
            z-index: 300;
            position: absolute;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 40px;
            text-align: center;
        }

        /* --- アニメーション --- */
        @keyframes zoomOutFade {
            from {
                opacity: 0;
                transform: scale(1.1);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* 下からスッと出てくるアニメーション */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes heartBeat {

            0%,
            30%,
            60% {
                transform: scale(1);
            }

            15% {
                transform: scale(1.2);
            }

            45% {
                transform: scale(1.15);
            }
        }

        .hidden {
            display: none !important;
        }

        /* --- ボタン関連 --- */
        #button-container {
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 150;
            padding: 0 24px;
            /* スッと出るアニメーションを適用 */
            animation: slideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .action-button {
            font-size: 18px !important;
            letter-spacing: 0.05em;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            transition: transform 0.1s;
        }

        .heart-icon {
            font-size: 80px;
            animation: heartBeat 1.2s infinite;
        }

        /* デバッグ用リセットボタン（控えめなデザインを維持） */
        #debug-reset-btn {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            padding: 8px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="app-container" id="app">

        <!-- 【1】 1日1回制限メッセージ -->
        <div id="limit-message" class="hidden">
            <h2 class="text-[#FF70CB] text-xl font-bold mb-4">占いチャンスは1日1回</h2>
            <p class="text-sm text-white mb-8">今日のラッキーファッションは<br>もうチェック済みだよ。<br>また明日回してみてね☆</p>
            <a href="index.html#profile" class="w-full max-w-[200px] mb-4">
                <button class="action-button w-full h-12 bg-[#5a9eec] text-white font-bold rounded-full">戻る</button>
            </a>
            <button id="debug-reset-btn" class="hidden" onclick="resetGachaLimit()">RESET (DEBUG)</button>
        </div>

        <!-- 【2】 ロード画面（音声アンロック用タップ待機） -->
        <div id="loading" class="hidden" onclick="unlockAudioAndStart()">
            <div class="flex flex-col items-center gap-4">
                <div class="text-[#FF70CB] font-bold text-xl">今日のラッキーファッションは？</div>
                <div class="heart-icon">🩵</div>
                <div class="text-white font-bold text-xl">ハートをタップ&nbsp;<span class="text-2xl">🐤</span></div>
            </div>
        </div>

        <!-- 【3】 ガチャ演出ビデオ -->
        <video id="gacha-video" class="hidden full-screen-content" playsinline muted></video>

        <!-- 【4】 結果表示画面 -->
        <div id="result-screen" class="hidden">
            <!-- 占い結果画像 -->
            <img id="result-display" src="" alt="Result">
            <!-- レア度に応じたエフェクトビデオ -->
            <video id="effect-video" class="hidden" playsinline muted></video>

            <!-- 操作ボタン -->
            <div id="button-container" class="hidden">
                <div class="flex w-full gap-3 justify-center max-w-[400px]">
                    <button id="special-btn"
                        class="action-button flex-[2.5] h-12 bg-[#ff81c2]/90 text-white font-black rounded-full border border-white/40">スペシャル画像ゲット</button>

                    <button id="save-btn"
                        class="hidden action-button flex-[2.5] h-12 bg-[#ff81c2]/90 text-white font-black rounded-full border border-white/40">保存する</button>

                    <a href="index.html#profile" class="flex-1">
                        <button
                            class="action-button w-full h-12 bg-[#5a9eec]/90 text-white font-bold rounded-full border border-white/30">とじる</button>
                    </a>
                </div>
                <div id="credit-text" class="text-[10px] text-gray-400 mt-2 transition-colors duration-300">画像生成：Gemini
                    / デザイン加工：Luminous Games</div>
            </div>
        </div>
    </div>

    <script>
        // --- 設定の読み込み ---
        const config = typeof GACHA_CONFIG !== 'undefined' ? GACHA_CONFIG : { isLimitEnabled: false, isDebugMode: true, probabilities: { "N": 100 }, imageIds: { "N": ["normal"] } };

        // --- 状態管理 ---
        const state = {
            currentRarity: 'N',
            currentId: '01',
            isVideoEnded: false,
            isImageLoaded: false
        };

        // --- DOM要素 ---
        const gachaVideo = document.getElementById('gacha-video');
        const effectVideo = document.getElementById('effect-video');
        const resultScreen = document.getElementById('result-screen');
        const resultDisplay = document.getElementById('result-display');
        const buttonContainer = document.getElementById('button-container');
        const creditText = document.getElementById('credit-text');

        // --- 音声リソース ---
        const sounds = {
            shake: new Audio('./parts/shake.mp3'),
            star: new Audio('./parts/star.mp3')
        };
        let currentVoice = null;

        // --- 初期化 ---
        window.onload = () => {
            Object.values(sounds).forEach(s => s.load());
            gachaVideo.load();
            if (config.isDebugMode) {
                const debugBtn = document.getElementById('debug-reset-btn');
                if (debugBtn) debugBtn.classList.remove('hidden');
            }
            checkLimit();
        };

        // --- 制限チェック（1日1回） ---
        function checkLimit() {
            const lastDate = localStorage.getItem('gacha_last_date');
            const today = new Date().toLocaleDateString();
            if (config.isLimitEnabled && lastDate === today) {
                document.getElementById('limit-message').classList.remove('hidden');
                document.getElementById('loading').classList.add('hidden');
            } else {
                document.getElementById('loading').classList.remove('hidden');
            }
        }

        function resetGachaLimit() {
            localStorage.removeItem('gacha_last_date');
            location.reload();
        }

        // --- ゲーム開始前の音声有効化 ---
        function unlockAudioAndStart() {
            Object.values(sounds).forEach(s => {
                s.muted = true;
                s.play().then(() => { s.pause(); s.currentTime = 0; s.muted = false; }).catch(() => { });
            });
            startGacha();
        }

        // --- ガチャ開始 ---
        function startGacha() {
            document.getElementById('loading').classList.add('hidden');
            state.isVideoEnded = false;
            state.isImageLoaded = false;

            // 確率に基づいた抽選
            const rand = Math.random() * 100;
            let cumulative = 0;
            for (const [rarity, prob] of Object.entries(config.probabilities)) {
                cumulative += prob;
                if (rand <= cumulative) { state.currentRarity = rarity; break; }
            }
            const ids = config.imageIds[state.currentRarity];
            state.currentId = ids[Math.floor(Math.random() * ids.length)];

            // 背景画像の事前読み込み
            resultDisplay.onload = () => { state.isImageLoaded = true; checkTransitionReady(); };
            resultDisplay.src = `./fashion/${state.currentRarity}_fs_${state.currentId}.jpg`;

            if (config.isLimitEnabled) localStorage.setItem('gacha_last_date', new Date().toLocaleDateString());

            // ビデオ再生開始
            gachaVideo.classList.remove('hidden');
            gachaVideo.src = './parts/gacha.mp4';
            gachaVideo.play();

            gachaVideo.onplaying = () => {
                setTimeout(() => { sounds.shake.play().catch(() => { }); }, 1500);
                gachaVideo.onplaying = null;
            };
        }

        // --- 演出終了後の画面切り替え ---
        gachaVideo.onended = () => { state.isVideoEnded = true; checkTransitionReady(); };

        function checkTransitionReady() {
            if (state.isVideoEnded && state.isImageLoaded) {
                resultDisplay.onload = null;
                gachaVideo.classList.add('hidden');
                showResult();
            }
        }

        // --- 結果画面の表示 ---
        function showResult() {
            resultScreen.classList.remove('hidden');
            const rarityLower = state.currentRarity.toLowerCase();

            setTimeout(() => {
                effectVideo.src = `./effects/star_${rarityLower}.mp4`;
                effectVideo.load();
                effectVideo.onloadedmetadata = () => {
                    effectVideo.classList.remove('hidden');
                    effectVideo.onplaying = () => {
                        sounds.star.play().catch(() => { });
                        setTimeout(() => {
                            if (currentVoice) currentVoice.pause();
                            currentVoice = new Audio(`./voice/voice_${rarityLower}.mp3`);
                            currentVoice.play().catch(() => { });
                        }, 500);
                        effectVideo.onplaying = null;
                    };
                    effectVideo.play().catch(() => { showButtons(); });
                };
            }, 100);
        }

        function showButtons() { buttonContainer.classList.remove('hidden'); }
        effectVideo.onended = () => { effectVideo.classList.add('hidden'); showButtons(); };

        // --- スペシャル画像への切り替え ---
        document.getElementById('special-btn').addEventListener('click', function () {
            if (currentVoice) { currentVoice.pause(); currentVoice.currentTime = 0; }
            resultDisplay.src = `./special/fs_${state.currentId}.jpg`;
            this.classList.add('hidden');
            const saveBtn = document.getElementById('save-btn');
            if (saveBtn) saveBtn.classList.remove('hidden');
            if (creditText) creditText.classList.replace('text-gray-400', 'text-white');
            setTimeout(() => {
                currentVoice = new Audio('./voice/gaido.mp3');
                currentVoice.play().catch(() => { });
            }, 200);
        });

        // --- 保存ボタンの処理（Blob方式で確実に保存） ---
        const saveBtn = document.getElementById('save-btn');
        if (saveBtn) {
            saveBtn.addEventListener('click', async function () {
                const imageUrl = resultDisplay.src;
                try {
                    const response = await fetch(imageUrl);
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = imageUrl.split('/').pop();
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                } catch (error) { console.error('Download failed', error); }
            });
        }
    </script>
</body>

</html>
